# Project information
site_name: EnerPlanET Documentation
site_author: THD-Spatial-AI
site_description: >-
  Community energy grid planning & simulation platform — documentation for EnerPlanET,
  PyLovo, and the simulation webservice.
site_url: https://enerplanet.github.io/enerplanet
# Repository
repo_name: enerplanet/enerplanet
repo_url: https://github.com/enerplanet/enerplanet
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material
  logo: assets/Logo_of_the_Technical_University_of_Munich.svg
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.prune
    - navigation.tabs
    - navigation.top
    - navigation.path
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - EnerPlanET Platform:
      - Overview: enerplanet/index.md
      - Installation: enerplanet/installation.md
      - Architecture: enerplanet/architecture.md
      - Deployment: enerplanet/deployment.md
      - Authentication (Keycloak): enerplanet/keycloak.md
      - Identity Brokering: enerplanet/keycloak-identity-brokering.md
  - PyLovo Grid Engine:
      - Overview: pylovo/index.md
      - Quickstart: pylovo/quickstart.md
      - Architecture: pylovo/architecture.md
      - Configuration: pylovo/configuration.md
      - Building Types: pylovo/building-types.md
      - AI Energy Estimation: pylovo/ai-estimation.md
      - REST API: pylovo/api.md
  - Simulation Webservice:
      - Overview: webservice/index.md
      - Energy Technologies: webservice/technologies.md
  - Open Source:
      - Checklist: getting-started/open-source-checklist.md

